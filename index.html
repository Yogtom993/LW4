<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перевірка адаптивності TechStore</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: #f4f6f8;
      font-family: Arial, sans-serif;
    }
    .tools {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #ffffff;
      border-bottom: 2px solid #222;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      padding: 14px 0;
    }
    .preview-wrap {
      width: 100%;
      overflow-x: auto;
      padding: 24px 0;
    }
    .preview-frame {
      display: block;
      width: 1200px;
      height: 900px;
      margin: 0 auto;
      border: 3px solid #222;
      border-radius: 10px;
      background: #fff;
      transition: width .25s ease;
    }
    .label-size {
      font-weight: 700;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <div class="tools">
    <div class="container">
      <strong>Перевірка адаптивності ЛР4:</strong>
      <button class="btn btn-dark btn-sm ml-2" onclick="setFrame(1200)">Desktop 1200px</button>
      <button class="btn btn-secondary btn-sm ml-2" onclick="setFrame(800)">Tablet / md 800px</button>
      <button class="btn btn-secondary btn-sm ml-2" onclick="setFrame(576)">SM 576px</button>
      <button class="btn btn-secondary btn-sm ml-2" onclick="setFrame(375)">Mobile / xs 375px</button>
      <span class="label-size" id="sizeLabel">1200px</span>
      <p class="mb-0 mt-2 text-muted">
        Кнопка Tablet / md має ширину 800px, щоб точно спрацьовував breakpoint md у Bootstrap 4.
      </p>
    </div>
  </div>

  <div class="preview-wrap">
    <iframe id="previewFrame" class="preview-frame" src="site.html"></iframe>
  </div>

  <script>
    function setFrame(width) {
      const frame = document.getElementById('previewFrame');
      const label = document.getElementById('sizeLabel');
      frame.style.width = width + 'px';
      label.textContent = width + 'px';
    }
  </script>
</body>
</html>
